<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>André | Tutoría Privada de Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-marino: #0b1a2a;
            --dorado: #c5a059;
            --dorado-brillante: #e5c185;
            --blanco-suave: #f4f7f9;
            --texto-oscuro: #1a1a1a;
            --rojo-error: #e74c3c;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--blanco-suave);
            color: var(--texto-oscuro);
            scroll-behavior: smooth;
        }

        header {
            background-color: var(--azul-marino);
            color: white;
            padding: 80px 20px 60px 20px;
            text-align: center;
            border-bottom: 4px solid var(--dorado);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--dorado-brillante);
        }

        header p.ubicacion { font-weight: 300; font-size: 1.2rem; letter-spacing: 1px; margin-top: 10px; opacity: 0.9; }

        .perfil-intro {
            max-width: 700px;
            margin: 30px auto 0 auto;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            font-weight: 300;
            line-height: 1.6;
        }

        .btn-linkedin {
            display: inline-flex; align-items: center; gap: 8px; background-color: transparent;
            color: var(--dorado); border: 1px solid var(--dorado); padding: 10px 25px;
            border-radius: 25px; text-decoration: none; font-size: 0.95rem; margin-top: 20px;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-linkedin:hover { background-color: var(--dorado); color: var(--azul-marino); font-weight: 600; }

        .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 60px 0; }

        .section-title {
            font-family: 'Playfair Display', serif; text-align: center; font-size: 2.5rem; margin-bottom: 50px;
        }

        .section-title::after { content: ''; display: block; width: 60px; height: 3px; background: var(--dorado); margin: 15px auto; }

        /* Planes */
        .pricing-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 60px;
        }

        .price-card {
            background: white; padding: 30px; text-align: center; border-radius: 8px;
            border: 1px solid #e1e1e1; transition: transform 0.3s, box-shadow 0.3s;
            position: relative; display: flex; flex-direction: column; justify-content: space-between;
        }

        .price-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .price-card.featured { border: 2px solid var(--dorado); background-color: #fffdf9; }
        
        .featured-tag {
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--dorado); color: var(--azul-marino); padding: 5px 15px;
            font-size: 0.8rem; font-weight: 600; border-radius: 20px; letter-spacing: 1px; z-index: 2;
        }

        .discount-badge {
            position: absolute; top: 15px; right: -10px; background: var(--rojo-error); color: white;
            padding: 5px 15px; font-size: 0.8rem; font-weight: bold; border-radius: 3px;
            transform: rotate(10deg); box-shadow: 0 3px 6px rgba(0,0,0,0.15); z-index: 10;
        }

        .price-card h4 { font-size: 1.3rem; margin: 0; color: var(--azul-marino); text-transform: uppercase; }
        .old-price { font-size: 1.2rem; color: #95a5a6; text-decoration: line-through; margin-top: 15px; display: block; margin-bottom: -15px; font-weight: 600; }
        .price-amount { font-family: 'Playfair Display', serif; font-size: 3.2rem; color: var(--azul-marino); margin: 15px 0; }
        .price-amount span { font-size: 1.2rem; }
        .price-card p { font-size: 0.95rem; color: #555; margin-bottom: 20px; }

        .btn-select {
            background-color: transparent; border: 2px solid var(--azul-marino); color: var(--azul-marino);
            padding: 10px 20px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 600;
            border-radius: 4px; transition: all 0.3s; width: 100%; text-transform: uppercase;
        }
        .btn-select:hover, .btn-select.
