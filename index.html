<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>André Ríos | Tutoría Privada de Élite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-marino: #0b1a2a;
            --dorado: #c5a059;
            --dorado-brillante: #e5c185;
            --blanco-suave: #f4f7f9;
            --texto-oscuro: #1a1a1a;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--blanco-suave);
            color: var(--texto-oscuro);
            scroll-behavior: smooth;
        }

        header {
            background-color: var(--azul-marino);
            color: white;
            padding: 80px 20px;
            text-align: center;
            border-bottom: 4px solid var(--dorado);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--dorado-brillante);
        }

        header p {
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-top: 10px;
            opacity: 0.9;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 0;
        }

        /* Sección Perfil */
        .profile-section {
            text-align: center;
            margin-bottom: 80px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border-top: 4px solid var(--azul-marino);
        }

        .profile-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--azul-marino);
            margin-bottom: 5px;
        }

        .profile-tag {
            display: inline-block;
            background: var(--dorado);
            color: var(--azul-marino);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .btn-linkedin {
            display: inline-block;
            background-color: #0077b5;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .btn-linkedin:hover {
            background-color: #005582;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--dorado);
            margin: 15px auto;
        }

        /* Grid de Servicios */
        .materias-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 80px;
        }

        .flip-card {
            background-color: transparent;
            width: 320px;
            height: 320px;
            perspective: 1000px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .flip-card-front {
            background-color: white;
            border-bottom: 4px solid var(--dorado);
        }

        .flip-card-front h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            color: var(--azul-marino);
        }

        .flip-card-back {
            background-color: var(--azul-marino);
            color: white;
            transform: rotateY(180deg);
            font-weight: 300;
            text-align: center;
        }

        /* Precios */
        .pricing-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .price-card {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
            transition: transform 0.3s;
        }

        .price-card:hover { transform: translateY(-10px); }

        .price-card.featured {
            border: 2px solid var(--dorado);
            background-color: #fffdf9;
            position: relative;
        }

        .featured-tag {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dorado);
            color: var(--azul-marino);
            padding: 5px 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 20px;
        }

        .price-amount {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--azul-marino);
            margin: 15px 0;
        }

        .price-amount span { font-size: 1.2rem; }

        /* Métodos de Pago */
        .payment-info {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--dorado);
        }

        .pago-despues {
            color: var(--azul-marino);
            font-style: italic;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .payment-methods {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .method { margin: 10px; }
        .method strong { color: var(--azul-marino); display: block; font-size: 1.1rem; }

        /* Botón Final */
        .contacto-final {
            background-color: var(--azul-marino);
            color: white;
            text-align: center;
            padding: 80px 20px;
            margin-top: 60px;
        }

        .btn-gold {
            display: inline-block;
            background-color: var(--dorado);
            color: var(--azul-marino);
            padding: 18px 40px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            margin-top: 30px;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        
        .btn-gold:hover {
            background-color: var(--dorado-brillante);
        }
    </style>
</head>
<body>

    <header>
        <p>EXCELENCIA ACADÉMICA A DOMICILIO</p>
        <h1>André Ríos</h1>
        <p>Monterrico, Surco</p>
    </header>

    <div class="container">

        <section class="profile-section">
            <span class="profile-tag">Perfil del Tutor</span>
            <h2>André Ríos</h2>
            <h3 style="font-family: 'Montserrat', sans-serif; font-size: 1.1
